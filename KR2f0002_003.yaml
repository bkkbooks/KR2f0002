body:
  text: 欽定四庫全書大清太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝聖訓卷三謙德天聰十年丙子三月庚申內院諸臣擬新築開城城門名曰揚威昭德永安興化定逺進呈御覽上曰此等矜誇僭越之字素與朕意不合興之揚之定之悉在於天非人力所能强得也凡事莫貴於務實今當以字義切當者書之遂更其名曰鞏固門靖逺門鎮西門崇德二年丁丑五月丁亥內院諸臣撰擬宣諭朝鮮敕書進呈上覽畢諭曰爾等撰文毋得過為誇大當順理措辭朕素不樂聞誇大之言彼明國之主自比於天輕視他人實甚身無德義徒事矜張究何益哉嗣後撰擬切宜詳愼毋得草率寬仁天命十一年丙寅九月甲戍上諭曰治國之要莫先安民我國中漢官漢民從前有私欲潛逃及令姦細往來者事屬已往雖舉首槩置不論嗣後惟已經在逃而被緝獲者論死其未行者雖首告亦不論由是漢官漢民皆大悅逃者皆止姦細絶跡天聰四年庚午二月壬申永平新降郎中陳此心既密令其子先遁復使家人攜資潛行為守門者所獲滿漢諸臣鞫訊論斬入奏上曰業已養之殺之何為不若縱還原籍於是賜此心馬匹銀兩並令攜妻子奴僕任其所往六月丙寅先是克明永平遷安二城上命貝勒阿敏駐守撫養其官民阿敏盡殺之以其妻子分給士卒上聞之曰朕留養官民已被屠戮何忍復令其妻子為奴耶命籍孤子嫠婦編為戶口給以房舍衣食俾無失所十二月壬子上率諸貝勒獵於積孰大貝勒代善部下䝉古猛克射麅誤中御衣代善急趨而前與嶽托俱欲射殺猛克上曰姑緩之代善固請上令額駙楊古利守護之諸貝勒皆謂此人獲罪重大豈宜寬宥上曰此人係誤射故赦之所謂宥過無大也命鞭一百釋之天聰八年甲戌六月戊寅上遣國舅阿什達爾漢巴克什希福諭䝉古諸貝勒曰科爾沁國額爾濟格貝勒之子噶爾珠塞特爾海賴布顏代塞布壘白谷壘等凡遇興師既不隨行又違法令於出兵後侵無主之國掠其牲畜朕以其為歸順之國不念其惡猶欲保全而屢宥之乃彼受朕豢養之恩安享逸樂竟不知德嘗欲叛朕奔察哈爾國今果叛往索倫為其族兄弟科爾沁土謝圖濟農扎薩克圖杜稜孔果爾吳克善等追獲噶爾珠塞特爾等俱已𬒳殺朕心猶為憫惻蓋朕視諸貝勒猶臂指然今殺彼猶傷吾指也朕原欲宣布德化招集人民使之共臻安樂乃諸貝勒不獲令終皆朕教化未洽之所致也今阿魯部落杜稜濟農之子弟達喇海薩陽等又踰所限之地駐牧按律應以軍法從事朕心不忍爾衆貝勒可議罪具奏崇德元年丙子四月乙酉上建國大清改元崇德諸貝勒大臣朝賀時朝鮮使臣羅德憲李廓不拜上曰朝鮮使臣羅德憲李廓無禮處難以枚舉是皆朝鮮國王有意搆怨欲朕先起釁端戮其使臣然後加朕以背棄盟誓之名故令其如此耳不知朕之素行從不逞一時之小忿如此瑣屑也即兩國已成讎敵兵刃相加爭戰之際以事遣人亦無即戮其來使之理况朝會乎其勿問崇德七年壬午五月癸酉洪承疇祖大壽及新附各官朝見於崇政殿上召承疇等入殿內命坐於左側賜茶問承疇曰朕觀爾明主宗室被俘置若罔聞至將帥率兵死戰或陳前被擒或勢窮降服必誅其妻子否則沒入為奴者何故此舊規乎抑新制乎承疇奏曰昔無此例今因文臣衆多各陳所見遂致如此上曰今之文臣固衆昔之文臣亦豈少邪特今君暗臣蔽故多枉殺似此死戰被擒勢蹙歸降之輩豈可戮彼妻子即其身在敵國可以財幣贖而得之亦所當為何至坐妻子以死徙之罪乎其無辜寃濫亦甚矣九月癸酉上諭諸王貝勒貝子公曰朕觀爾等養育新附滿洲䝉古漢人當朕申飭之際尚稍知加意過此即便遺忘莫顧如是則新附之人何以為生乎爾等嗣後當各盡心力恩養所屬之人誠能恩養即為勤勞國政之人朕心亦深嘉悅否則不過一村居富人祇圖一家富足而已豈為盡心國政之人哉十月辛亥上命多羅饒餘貝勒阿巴泰為奉命大將軍與內大臣圖爾格率兵征明召入清寧宫諭曰朕命爾等統領大軍征伐明國者非好為黷武窮兵也朕不忍使生靈罹害屢欲與明修好而彼國君臣執迷不從朕是以命爾等往征爾等一入明境遇老弱閒散之人毋任意妄殺不堪作俘之人毋奪其衣服毋離人妻子毋焚燬財物毋暴殄糧穀曩者兵臨山東時有因索取財物而嚴刑拷逼者非仁義之師也此朕所深惡爾等當切以為戒傳諭各旗知悉智略天聰三年己巳十一月庚戌上率大兵征明圍燕京諸貝勒大臣俱請攻城上曰朕承天眷佑攻固可以必得但所慮者堅城之下倘失我一二良將徑卒即得百城亦不足喜朕視將卒如賢子然朕聞子賢父母雖無積蓄終能成立子不肖雖有積蓄不能守也惟善撫我軍蓄養精鋭以之從征䝉天眷佑自無敵於天下矣遂止弗攻天聰四年庚午二月甲寅上召新獲總兵官麻登雲等至御幄賜宴諭之曰明國君視如許將士之命竟同草芥常驅之死地朕屢遣使議和何竟無一言相報也登雲對以明國君幼沖執政者各圖自保懼不敢奏上曰若然是天賜我機也豈可棄之而去但駐兵屯守民不得耕耨無以為生朕心惻焉且彼山海關錦州防守甚堅徒勞我師攻之何益惟當深入內地取其無備城邑可也天聰八年甲戌四月辛酉上諭曰朕聞國家承天創業各有制度不相沿襲未有棄其國語反習他國之語者事不忘初是以能垂之久逺永世勿替也䝉古諸貝子自棄䝉古之語名號俱學喇嘛卒致國運衰微今我國官名俱因漢文從其舊號夫知其善而不能從與知其非而不能省俱未為得也朕纘承基業豈可改我國之制而聽從他國嗣後我國官名及城邑名俱當易以滿語毋得仍襲漢語舊名俱照我國新定者稱之若不遵新定之名仍稱漢字舊名者是不奉國法恣行悖亂者也察出決不輕恕天聰九年乙亥二月戊子上諭刑部承政高鴻中文館覺羅龍什寧完我范文程羅碩剛林詹霸等曰近見漢官及諸生陳奏皆謂此時宜速興師征明用兵以招撫為尚勿殺敵人夫用兵殺敵此豈朕心所樂但臨敵之際我不殺彼能禁彼之不我殺乎朕思用兵制敵之道逆者誅之順者撫之酌恩威而竝用方為仁義之師何伊等所見之偏耶至謂朕宜速出師以成大業此亦不達時勢之見夫朕豈不願成大業而專以遊畋為樂耶但圖大事亦須相機順時而動今察哈爾䝉古皆新來歸附降衆未及撫綏人心未及安輯城郭未及修繕而輕於出師其何以克成大業且朕於舊歸新附之人皆不惜衣服財帛馬匹牲畜以養之又每日三次賜宴豈不憚煩直欲使人心悅服以圖大事耳若人心未和雖興師動衆焉能攻城必克野戰必勝今以速出師為言者乃小人之淺見朕度其意不過欲勞師旅克城池冀得財貨以償一已之勤勞而軍國之艱難竟置之膜外也凡建言者宜從國事起見或妄殺無辜或政令有失或所行悖戾見有過誤之處即當實指其過誤而引其君於當道此等直諫之人朕則謂之真誠為國識之不忘雖朕之素行凡遇寵任之人不使過分然茍能實心為國朕亦未嘗不久而眷注也朕反覆思維將來我國既定之後大兵一舉彼明主若棄燕京而走其追之乎抑不追而竟攻京城或攻之不克即圍而守之乎彼明主若欲請和其許之乎抑拒之乎若我不許而彼逼迫求和更當何以處之倘䝉天佑克取燕京其民人應作何安輯此朕之時為廑念者也爾高鴻中鮑承先寧完我范文程等其酌議疏奏以聞崇德元年丙子十一月癸丑上御翔鳳樓集諸親王郡王貝勒固山額真都察院諸臣命內𢎞文院大臣讀金世宗夲紀上諭諸臣曰爾等審聽之世宗者䝉古漢人諸國聲名顯著之賢君也故當時後世咸稱為小堯舜朕披覽此書悉其梗槩殊覺心往神馳耳目倍加明快不勝歎賞朕思金太祖太宗法度詳明可垂久逺至熙宗合喇及完顏亮之世盡廢之耽於酒色盤樂無度效漢人之陋習世宗即位奮圖法祖勤求治理惟恐子孫仍效漢俗預為禁約屢以無忘祖宗為訓衣服語言悉遵舊制時時練習騎射以備武功雖垂訓如此後世之君漸至懈廢忘其騎射至於哀宗社稷傾危國遂滅亡乃知凡為君者耽於酒色未有不亡者也先時儒臣巴克什達海庫爾纒屢勸朕改滿洲衣冠效漢人服飾制度朕不從輒以為朕不納諫朕試設為比喻如我等於此聚集寬衣大袖左佩矢右挾弓忽遇碩翁科羅巴圖魯勞薩挺身突入我等能禦之乎若廢騎射寬衣大袖待他人割肉而後食與尚左手之人何以異耶朕發此言實為子孫萬世之計也在朕身豈有變更之理恐日後子孫忘舊制廢騎射以效漢俗故常切此慮耳我國士卒初有幾何因嫺於騎射所以野戰則克攻城則取天下人稱我兵曰立則不動搖進則不回顧威名震懾莫與爭鋒爾等其謹識朕言己巳上諭朝鮮國曰朕親統大軍來此原非好用兵戈利兹疆土也朕與爾國壤地相接從無嫌隙向欲常相和好奈爾國君臣不願己未歲助明害我興兵搆怨其端自爾國發之當時猶念大義姑為容隱未遽加兵及既得遼東之後屬我版圖爾國又招誘我遼民而獻之明國復容匿明人居於爾地給以糧餉協謀圖我朕是以怒而興師有丁卯年之役也朕猶念鄰國之誼兵不深入結好而歸此豈爾兵將之力能退我師哉蓋朕憫民命之傷殘念交鄰之大義欲仍敦和好故撤師耳邇來十年之間爾國君臣納我叛亡盜我物産明之孔耿二將來歸爾又興兵截戰我兵往援爾以鎗炮拒敵戰爭又自爾啓之又明欲侵我索船於爾爾即與之及朕取船征明爾輒不肯發爾居兩國之間若皆不與猶可也乃與明而不與我豈非助明而圖我乎且我國使臣不令接見所遺之書又不開視悖慢無禮又自爾行之今爾主又與平安道洪觀察使密書其言皆欲與朕棄盟修怨啓釁尋仇朕因是特起義兵聲罪致討原非欲加害爾等也亦爾之君臣貽禍於爾等耳爾等但安居樂業愼毋輕動如妄自竄走恐遇我兵見害凡拒敵者必誅奔逃者則俘之傾心歸順者秋毫無犯更加恩養諭爾有衆咸使聞知大清太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝聖訓卷三
