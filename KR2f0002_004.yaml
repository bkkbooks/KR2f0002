body:
  text: 欽定四庫全書大清太宗應天興國𢎞徳彰武寛溫仁聖睿孝敬敏昭定隆道顯功文皇帝聖訓卷四求賢天聰九年乙亥二月壬午上諭曰朕惟圖治以人才為夲人臣以薦賢為要爾滿漢䝉古各官果有深知灼見之人即當悉行薦舉所舉之人無論舊歸新附及已仕未仕但有居心公正克勝任使者即呈送吏部有通曉文藝居心公正足備任使者即呈送禮部該部貝勒奏聞朕將量才錄用天下才全徳備之人實不易得但能公忠任事者其速行薦舉崇徳六年辛巳六月辛亥内三院大學士范文程希福剛林等奏請於滿漢䝉古内考取生員舉人上從容諭曰忠經有云在官惟明涖事惟平立身惟清聽不可以不聰視不可以不明清則無欲平則無曲明能正俗聰則審於事明則辨於理爾等當善體此言從公考校求言天聰三年己巳六月乙丑上諭諸貝勒大臣曰戰爭者生民之危事太平者國家之禎祥從前遣白喇嘛向明議和明之君臣若聽朕言克成和好共享太平則我國滿漢䝉古人等當採參開礦與之交易若彼不願太平而樂於用兵不與我國議和以通交易則我國所少者不過縀帛等物耳我國果竭力耕織以裕衣食之源即不得縀帛等物亦何傷哉我屢欲和而彼不從我豈可坐待定當整旅西征師行時勿似曩日以我兵獨往當令䝉古科爾沁喀爾喀扎魯特敖漢柰曼諸國合師並舉夫師徒既衆供億浩繁陸運糗糧恐不能給必得輕舟挽載至河西西寧堡方無遺誤宜預採取木植廣造舟楫以備軍行之用此朕意也但一人所見未必悉協於衆詢謀僉同乃克有濟滿漢䝉古中有謀畧素裕可禆益軍政者各以所見入告朕將擇而用之天聰五年辛未三月乙亥上以書三函遣巴克什等一與兩大貝勒一諭議政十貝勒一諭八大臣與兩大貝勒書曰兄等衆共定䇿推戴眇躬六年以來無日不兢兢業業期上繼前業下協民情頃聞國人或有怨言豈無所闕失而致然乎其所以然者必因審理刑獄以致怨讟滋多此其咎或亦在予乎第已有過何能自知旁觀者必明將刑罰不平與貪黷貨色與荒於佚樂以致怠惰與抑賞功不明有所偏私與夫此大業非予𦕈躬所能自致也乃我皇考太祖皇帝艱難締造之基我等克纉前緒祗承罔墜皇考神靈亦為欣慰即上天亦加眷佑儻有隕越則皇考神靈不無怨恫即上天亦加譴責矣古人有言同舟共濟濟則均享其福不濟則均受其害我諸兄勿以予故而或面從予有失不妨盡言直諫若言不見納方可棄予而不言今六年以來未聞諸兄一言獻納予何由而知其失乎我兩兄試熟思之有當為予言者宜即言之國家有大事宜整頓者務宜整飭更新共知遵守否則恐我之法紀不明矣諭十貝勒書曰我皇考太祖神靈天縱撫服諸國以貽後人爾諸弟姪推戴朕躬奉我皇考太祖鴻緒嗣登君位六年於兹未聞爾等一言規朕之過豈以朕為不可與言者乎朕思爾等未嘗有竭忠盡言以致擯棄者是朕未嘗不樂聞已過也今聞國人皆有怨言此豈無所闕失而然所以然者總因審理刑獄以致多怨耳或有乖國法審斷不公與抑朕躬耽於佚樂與黷於財貨與朕孑然獨處不自知其非爾等旁觀者明於上下諸人之過必皆見之知而不言以期為治難矣此後凡有所見即宜直言朕與諸貝勒之過愆以及百姓之疾苦各據所知一一指陳無有所懼而黙黙也爾諸貝勒有宜公言於朝者會議以聞至國家法紀臣民遵守務期至當有宜更改者作何更改即各以所見敷奏焉諭八大臣曰爾八大臣皆由衆人之中擢居要職與於諸貝勒之列共參國政原為朕與諸貝勒有過令爾規諫庶於國計民生有所禆益今聞國人皆有怨言其怨者總因審理刑獄致有繁言也朕獨居於内惟與爾等相接惟與爾等共議外事何由而知爾等入則賛襄廟謨出則辦理國事上下中外一切事宜未有不知者從前爾等逡巡緘黙或恐言之而獲咎且恐未必見從試思前此以諫諍之故而罷斥者為誰譴責者為誰若朕之虚懷聽納爾等固共見矣爾等容黙之習斷宜省改况上天垂佑正在此時若不及時敷奏見之施行朕於爾等更何賴焉嗣後有應為朕言者其悉心陳論朕與諸貝勒及執法諸臣有所闕失隨時改正國家法紀有應更改者作何更改朕不難聽從凡一切政事爾等以公忠體國之心旦夕不忘則治化日隆爾等亦名垂後世矣天聰六年壬申二月甲戌副將高鴻中上疏條奏上曰上書陳言所以廣朕耳目指陳時政得失也朕方事求言何可禁止然疏中所奏多援引古人過失彼不讀書不悉其行事遂多以前人為剌謬矣今巴克什等日侍左右當時以此等事啟我毋妄議前人所行為非也昔元成吉思皇帝之子察罕代以鋸刀削檉柳為鞭遂曰我國固父皇所定此檉柳為鞭乃我所手剙也其臣俄齊爾塞臣曰非先帝鳩工以製此刀則此檉柳豈能以指削以齒齧邪凡此大業國土人民一切諸務皆先帝所崛起而創立者乃不以為意而自作聰明是貽譏於萬世也似此繩愆糾繆方見忠誠爾等宜詳念之天聰七年癸酉六月丁亥上諭曰朕虚懷聽覽樂聞讜言如朕所行未協乎義宜直言勿諱政事或有愆忘宜開陳無隱或六部事有不公諸臣姦偽貪邪宜直行糾劾即諸臣或有艱苦之情亦宜據實奏聞茍不務直言而徒逺引曲喻自為身謀紛然陳奏不惟朕難於觀覽即於爾等亦無裨益嗣後凡有建白惟當直陳如心有獨得不妨就所創獲入獻嘉謀若勦襲故聞以為陳奏何益於事邪天聰八年甲戌十二月丙午朱延慶疏薦陳極新申朝紀上覽疏畢召延慶及所舉二人至諭延慶曰爾所奏甚善人臣進言正當如此若徒摭拾古事陳奏其所稱說皆無濟於實用何足取乎大凡建言之人果有所見必實指曰某也賢某也不肖於執政諸大臣必實指曰某大臣能稱厥職某大臣惟利是圖某徇庇所私之人某傾害所惡之人務直指其名無事朦混即朕躬或有過失亦必實指其事入告斯為無欺無隱之道耳至在廷諸臣於賢才皆得薦舉毋曰賢才已如此衆多上猶不以為足而求之不已也若爾等所舉之人或變其初心後為不善亦彼自為不善耳於舉者何與今朕將錄用爾三人併欲使大小臣工明知朕意焉崇徳元年丙子五月丁巳上諭都察院諸臣曰爾等身任憲臣職司諫諍朕躬有過或奢侈無度或誤譴功臣或逸樂遊畋不理政務或荒耽酒色不勤國事或廢棄忠良信任姦佞及陟有罪黜有功俱當直諫無隱至於諸王貝勒大臣如有荒廢職業貪酒色好逸樂或朝會不敬冠服違式及欲適已意託病偷安而不朝參入署者該禮部稽察若禮部徇情容隱爾等即應察奏或六部斷事偏謬及事未審結誑奏已結者爾等亦稽察奏聞凡人在部控告該部王及承政未經審結又赴告於爾衙門者爾等公議當奏者奏不當奏者公議逐之明國陋規都察院衙門亦通行賄賂之所爾等當互相防檢有即據實奏聞若以私讐誣劾朕察出定加以罪其餘章奏所言是朕即從之所言非亦不加罪必不令被劾者與爾面質也爾等亦何憚而不直陳乎至於無職庶人禮節錯誤不必指奏我國初興制度多未嫺習爾等敎誡而寛釋之可也六月戊子上御清寧宫都察院承政阿什達爾漢等奏稱有一僕告主審實將原告撥與他人為奴上曰此等事固應奏聞但爾等大臣不惟如此小事應奏今後雖朕有過失及親王郡王以下衆官員内有行事乖張欺壓小民怠政壞法等罪俱當陳奏民人内有自謂前知禍福及師巫邪術左道惑衆之人俱當即行奏聞若止奏在下細民之事將在上之人之事匿不奏聞非忠直之道也又諭曰凡人果能正直以行雖上天鬼神尚不能搖動人主可得而奪之乎古云以忠直行之氣數不能撓世變不能遷此之謂也崇徳七年壬午七月庚午上召諸王貝勒貝子公固山額真議政大臣等入清寧宫諭曰朕觀爾等所行於國家政事皆不肯身任效力每謂國家之事於已無渉因循推託專委之朕似此不殫竭心力獨不畏天乎不勤政亊之人上天豈佑之乎朕常戒爾等不盡心政事者惟恐爾等失為臣之道而召天譴也從前怠於政事而失臣道者上天譴罰爾等已悉見之矣若勤於政事而盡臣道則必䝉上天恩佑政舉而身榮其理詎不彰明較著乎今征戰之事朕不具論但思爾諸王貝勒貝子公大臣等每率所屬大小將士出兵於外其人之賢否必已熟悉則某人賢某人不肖何不據實奏聞邪若不奏聞朕何由知之加以黜陟也緬想皇考太祖時蘇完蜚英東扎爾固齊見人之不善必先自斥責而後劾之見人之善必先自奬勵而後舉之其被劾者無怨言被舉者亦無驕色朕今並未見爾等以善惡實奏似斯人之公直也輯人心崇徳七年壬午五月癸酉上御崇政殿命擒獲明總督洪承疇總兵祖大壽副將祖澤逺等朝見洪承疇叩首請罪上諭曰彼時與我軍交戰各為其主朕豈介意朕所以宥爾者以擊敗十三萬兵與得松錦諸城皆天也天道好生善養人者斯合天道朕故推恩活爾爾但念朕撫育之恩盡心圖報從前情罪悉予寛釋昔陣前所獲張春亦曾養之彼不能為明死節又不能效力事朕一無所成而死爾愼勿如彼之所為也祖大壽叩首請罪上諭曰爾之背我一則為爾主一則為爾妻子宗族耳然得汝而不加誅之意朕懐之久矣朕常語内院諸臣曰祖大壽必不能死後來被困仍當俯首來降朕則始終待以不死也往事已不可追此後當竭盡爾力以事朕則善矣祖澤逺叩首請罪上諭曰爾乃志量𥚹淺之人所以不復來歸者亦視主將祖大壽耳昔朕往視杏山爾不但不肯開門迎降乃明知是朕而特發火礮豈非背恩之大者乎爾舉礮能傷㡬人邪無論爾小城士卒無多即洪承疇以十三萬兵屢舉火礮所傷亦復有㡬朕因爾背恩太甚故言及此朕見人之過即明言曉諭斷不念其舊惡事後復加推求豈但待爾如此即尊於爾之祖大壽尚且畱養况爾小人何足加誅爾年方少壯自後凡遇戰陣奮發效力可也恤民天聰元年丁卯六月戊午上諭曰各旗所屬之人勤惰不齊貧富亦異夫務農積貯為足食之夲而有無相恤實弭盜之原爾諸大臣務加詳察若力不能耕種而無糧贍養者有兄弟則令與兄弟相依無兄弟則令牛彔下殷實有糧者養之其為諸貝勒素知才能之人有不能耕種而無糧贍養者須詳察其情告知諸貝勒設法贍養毋俾失所時國中大饑盜賊繁興諸臣奏請按律嚴懲上惻然諭曰今歲國中因年饑乏食致民不得已而為盜耳緝獲者鞭而釋之可也遂下令是歲讞獄姑從寛典仍大發帑金散賑饑民天聰二年戊辰三月戊子上諭曰國家疆域日開首重生聚國中有貧乏無妻室者可給資令其婚娶於是發帑金分賜無妻室之人天聰七年癸酉正月庚子上諭各牛彔額眞曰田疇廬舍民生攸賴勸農講武國之大經爾等宜各往該管屯地詳加體察不可以部務推諉若有二三牛彔同居一堡者著於各田地附近之處大築牆垣散建房屋以居之遷移之時宜聽其便至於樹藝之法窪地當種粱稗高田隨地所宜種之地瘠須加培壅耕牛須善飼養爾等俱一一嚴飭如貧民無牛者付有力之家代種一切徭役宜派有力者勿得累及貧民如此方稱牛彔額眞之職若以貧民為可虐濫行役使惟爾等子弟徇庇免其差徭則設爾牛彔額真何益邪至所居有卑濕者宜令遷移若憚於遷移以致傷稼害畜俱爾等牛彔額眞是問方今疆土日闢凡田地有不堪種者儘可更換許訴部臣換給如給地之時爾牛彔額眞章京自占近便沃壤將逺瘠之地分給貧人許貧人陳訴再爾等於該管之地各宜督率所屬長幼於春夏秋三時勤於習射朕不時遣部臣往察如有不能射者必治牛彔額眞之罪此係我國制勝之技何可不努力學習邪崇徳二年丁丑二月癸巳上諭户部曰朕聞巨家富室有積儲者多期望穀價騰貴以便乘時射利此非憂國之善𩔖實貪吝之匪人也此等匪人自謂人莫已知殊不知衆誰汝掩必至敗露向者因國賦不充已令八家各輸藏穀或散賑或糶賣今八家有糧者無論多寡盡令發賣伊等何不念及於此今後凡有藏榖者俱著發賣若强伊等輸助或不樂從今令伊等得價貿易而或不聽從是顯違國家之令可乎崇徳五年庚辰閏正月癸未上諭各固山額眞曰今遣爾等往各處地方稽察窮民審理寃獄爾等湏各親至所屬屯堡巡行料理毋使民間寃抑不得上聞崇徳八年癸未六月乙酉上幸御馬厰見部臣役遣民夫修治道路不分高下皆增土培高諭諸臣曰國有差徭民力疲敝皆由工部所致如修治道塗不過損高就下取其平坦而已乃不論高下概行培築重困民力甚為擾累至於民房稠密之處不即量行拆毁布置均匀乃止揭取數椽而置之小民何以安居爾等其詳加查究勸農天聰九年乙亥三月戊辰上集諸臣於朝諭之曰朕昨出見民間耕種愆期蓋因牛彔章京有事城工欲先時告竣故額外派夫致誤耕作築城固為正務然田地荒蕪民食何賴嗣後有濫役民夫致妨農務者該管牛彔章京等俱治罪崇徳二年丁丑二月癸巳上諭户部曰昨歲春寒耕種失時以致乏穀今歲雖復春寒然三陽伊始農時不可失也宜早勤播種而加耘治焉夫耕耘及時則稼無災傷可望有秋若播種後時耘治無及或被蟲災或逄水澇穀何由登乎凡播穀必相其土宜土燥則種黍穀土濕則種秫稗各屯堡撥什庫無論逺近皆宜勤督耕耘若不時加督率致廢農事者罪之崇徳七年壬午六月癸卯上召大學士范文程剛林學士羅碩曰太祖時凡遇行兵巡幸軍士有踐踏田禾者重則射之輕則鞭之處分嚴明所以重農事也近來諸王貝勒行兵出獵見有踐踏田禾者亦曾察出定罪否何並無一究治者邪若果有之朕何未之聞邪朕前往牧馬之所見内大臣塔瞻等踐踏田禾已奪取其矢交與兵部究治矣至於出兵有功有罪官員應令其在盛京候定功罪若其餘閒散官員即當令其各往夲牛彔屯莊查勘田土鋤墾與否如有棄而未鋤者可撥工助之五穀乃萬民之命所闗何得兀然閒坐畧不介意也其所定出兵官員功罪伊等心服則已若有屈抑即以奏聞興文敎天聰三年己巳四月丙戌上命儒臣分為兩直巴克什達海同筆帖式剛林蘇開顧爾馬渾托布戚等四人翻譯漢字書籍巴克什庫爾纒同筆帖式吳巴什查素喀胡球詹霸等四人記注夲朝政事以昭信史八月乙亥上諭曰自古國家文武並用以武功戡禍亂以文敎佐太平朕今欲振興文治於生員中考取其文藝明通者優奬之以昭作人之典諸貝勒府以下及滿漢䝉古家所有生員俱令考試各家主毋得阻撓有考中者仍以别丁償之天聰五年辛未閏十一月庚子上諭曰朕令諸貝勒大臣子弟讀書所以使之習於學問講明義理忠君親上實有賴焉聞諸貝勒大臣有溺愛子弟不令就學者得毋謂我國雖不讀書亦未嘗誤事與獨不思昔我兵之棄灤州皆由永平駐守貝勒失於救援遂致永平遵化遷安等城相繼而棄豈非未嘗學問不明理義之故乎今我兵圍明大凌河城經四越月人皆相食猶以死守雖援兵盡敗凌河已降而錦州松山杏山猶不忍委棄而去者豈非讀書明道理為朝廷盡忠之故乎自今凡子弟十五歲以下八歲以上者俱令讀書如有不願敎子讀書者自行啟奏若爾等溺愛如此朕亦不令爾身披甲出征聽爾任意自適於爾心安乎其咸體朕意毋忽天聰六年壬申三月戊戌上諭巴克什達海曰國書十二頭字向無圈㸃上下字雷同無别幼學習之遇書中尋常語言視其文義易於通曉若至人名地名必致錯誤爾可酌加圈㸃以分析之則音義明曉於字學更有禆益矣天聰七年癸酉十月己巳上諭文館儒臣曰昔皇考太祖欲剙造滿書巴克什額爾徳尼辭以不能太祖曰汝何謂不能但以䝉古字合我國之語音聯綴成句何為不可吾意已定汝毋辭額爾徳尼遂遵諭編成滿書我國初無滿字額爾徳尼乃一代傑出之人今也則亡彼所造之書義或有在其後巴克什庫爾纒所增朕恐終有未合爾記載諸臣將所載之書宜詳加訂正若有舛譌之處即酌改之朕嗣大位凡皇考太祖行政用兵之道若不一一備載垂之史冊則後世子孫無由而知豈朕所以盡孝乎大清太宗應天興國𢎞徳彰武寛溫仁聖睿孝敬敏昭定隆道顯功文皇帝聖訓卷四
