body:
  text: 欽定四庫全書大清太宗應天興國𢎞徳彰武寛溫仁聖睿孝敬敏昭定隆道顯功文皇帝聖訓卷二訓羣臣天聰四年庚午二月丙辰上諭衆貝勒諸臣曰爾等仰䝉天佑凡所行之事皆當處之以義毋貪黷以利己毋偏庇以徇人天人一理在下之士卒悅服則天心亦嘉與之矣夫事因不知而錯誤妄行猶出於無心之過若如喀克篤禮令其夲旗薩木哈圖巴圖魯為夲牛彔人運取柵木以苦之又使往登昌黎城是有心違悖於理矣爾衆貝勒諸臣視夲旗效力勞苦之人當如身親其勞而惻然憐憫則效力者益感激奮勵樂為之用若不加憐憫而任意驅使雖素所親信之人亦豈肯為之盡忠效用哉昔吴起吮其卒之癰卒之母哭之有卒問曰汝子癰而將軍吮之何以哭為其母曰此子之父被創吳將軍吮之遂亡於陣吾恐此子亦如其父之死也是以哭之似此等厮養之卒不幸而死則己幸而得生當思用之俾為朝廷及諸貝勒建功立業爾等於一次奮勇登城之人即宜加意愛惜倘再遇攻城時縱彼有奮勇之心切不可復令之往也九月戊戌上御殿集兩大貝勒衆貝勒八旗大臣䝉古諸貝勒大臣漢官等傳諭曰爾等將士之意將毋謂干戈未息厲兵秣馬無有已時以從征勞瘁為慮不知敵國侵陵仇怨所積義當征伐豈彼實無罪而我好為爭戰耶倘按兵不動我雖欲静敵豈能相安無事且盛暑嚴寒朕與諸貝勒身親勞苦戮力行間豈所樂為亦出於不得已也今後凡管兵備禦以上總兵官以下各宜盡心為國俾牛彔下人等竭力奮勉無生厭怠之心至牛彔下壯丁原係均分何以士卒有衆寡馬數有贏耗皆由牛彔額眞賢否不同之故宜各加意撫恤收養從來國家締造鴻業無不勵精勤而戒佚豫爾諸貝勒大臣等果能同心協力樹績疆場倘䝉天佑大勲克集邊圉無烽燧之警黎庶有敉寧之慶耕桑樂業衣食豐饒共享太平豈不休哉其或有因無官守家業殷富遂耽於逸樂罔勤王事者亟當悔罪自新竭力赴義毋自甘廢棄也天聰五年辛未正月乙未上諭額駙佟養性曰凡漢人軍民一切事務付爾總理各官悉聽爾節制如屬員有不遵爾言者勿徇情面分别賢否以聞爾亦當殫厥忠忱􅂤善絀惡恤兵撫民竭力供職勿私庇親戚故舊陵轢疎逺仇讐致負朕委任之意昔廉頗藺相如一將一相以争班位幾成嫌釁幸相如重視國事不念私讐是以令名垂於千祀願爾效之七月辛巳上御殿集諸貝勒大臣諭曰朕嗣位以來所用皆太祖舊臣其行事朕所畧悉近見新進少年諸臣每至朕前言動舉止加意修飭朕何由知其賢否伊等宜各殫忠誠容止之度未足憑也又勅六部諸臣各有職業各宜勤愼以省過改愆為訓誡又諭曰爾諸貝勒大臣見朕有過即當極諫無有所諱即如爾等何嘗無過當議論國事時常誇詡鷹犬良馬旁及戲言即此一節豈非過乎凡人有過當反求諸己而已天聰六年壬申正月丁巳上諭六部大臣曰國家設官分職原以理庶政佐太平也爾等身膺職守自應潔已愛民奉公守法以副朕意今邪慝之念何以不悛耶夫以爾等為賢故擇而任以部事乃仍有挾詐妄行者殊非朕委任之意爾見朕與諸貝勒曾妄取國中良馬美女乎抑貪財貨乎如有之爾諸臣當開導進言言之不從咎在朕與諸貝勒矣今朕與諸貝勒厚自檢束而爾等惟事妄行可乎况大業垂成贊襄盛治惟爾臣工是賴似此妄行何以治國爾等當敬識朕言勉圖職業則天必垂佑朕亦眷愛之矣八月癸酉六部衙門工竣上親往視還宫時召六部啟心郎索尼布丹祁充格穆成格額爾克圖苗碩渾六人諭之曰朕以爾等為啟心郎爾等當顧名思義克盡厥職如各部諸貝勒凡有過失爾等見之即明言以啟迪其心俾知改悔若一時面從及事已往而退有後言斯最下之人所為也汝等先自治其身身正而後可以言諫上如不治其身不勤部事則自反尚多抱愧何以取重於人雖懇切言之上必不聽人亦不信也天聰七年癸酉九月辛丑上御殿召征明山海闗貝勒大臣等責之曰爾等此行用兵甚不合法既㨗之後何不深入内地收取糧餉休息士馬乃遽速還耶貝勒雖欲還軍揚古利爾係舊臣何不諫止爾若能諫貝勒誰不聽從想爾為築室未成乘此未寒急圖竣工故遽來耳即來時爾諸貝勒若能率領精兵殿後截殺明之追兵必獲大勝何至相率俱來止留土魯什勞薩等哨兵殿後彼時敵兵數千追至雖以寡敗衆實皆上天眷佑及我兵精銳故也萬一有失不知爾貝勒等尚能來見朕否圖爾格納穆泰蘓納等係有罪之人雖經革職仍用為各部承政凡遇攻城不忍令爾等前往今乘此凱旋之際正宜率兵殿後戮力建功以圖自效乃亦隨衆前行倘他日大軍出征攻城野戰之時衆皆奮勇齊進誰肯居爾等後者爾等將何時自奮乎皇考太祖時敖堪特翁格伊喇喀弩賽四臣皆能率先力戰竝未嘗殁於臨陣夫人生能有百歲乎天數既盡不免於亡巴克什吳訥格所在建功今又殿後首先殺敗敵兵人臣為國義當如此爾諸大臣不能啓迪貝勒之心竭力為國止圗安享富貴逡巡畏縮不知爾等可能長保富貴耶十月己巳上召六部滿漢啓心郎諭曰自設立六部以來惟吏戸兵三部辦事妥協不煩朕慮禮刑工三部辦事多有缺失若因事未諳而錯誤尚可寛宥乃伊等竝不實心辦事如刑部聽訟兩造俱至即當拘見証審問自可得其實情茍遷延日久然後訊問致彼串合供辭實情豈能盡得至於工部更不及他部此皆貝勒才短承政疎忽啓心郎怠惰故耳禮部辦事亦有缺失向嘗誡諭爾等啓心郎不得干預部事但坐於各貝勒之後倘有差謬則啓其心今聞各部貝勒多在私家理事果爾則設立衙門何為此皆妄自尊大而慢於政事也似此情事爾等何不開導之各部之事若不勤加整理至三年考績或陞或降被降貝勒大臣啓心郎豈不愧悔耶六部諸臣内英俄爾岱為人執抝待夲旗人微有徇庇朕思人有全徳者少彼能盡心部務辦事明決朕實嘉之其餘各部大臣不如彼之盡心辦事者甚多隨事啓迪非爾等啓心郎之責而誰責乎爾漢啓心郎生員等動輒以航海取山東攻山海闗為言夫航海至危之事而我國又不善操舟至於山海闗素號險固未易攻取此豈非欲航海者咸没於水欲攻險者致損其兵乎我國方承天眷甫集之兵民無幾若少􅉛損何以克成大業為此說者是為敵人而損我兵徒以空言相賺耳此等疏奏何益之有朕為一國之主與諸貝勒共圖軍事豈有不相其機宜之理此自不待爾等陳說如朕與諸貝勒或不理國政貪貨利耽酒色貽誤機務爾等言之朕若不聽朕之過也至爾等既任啓心郎之職遇夲部貝勒有過言之不從遂黙而不言可乎當再三言之終不見從方可奏朕爾等見部務差謬不能整飭竝無一言啓貝勒之心何以輒來瀆奏乎天聰八年甲戌正月癸卯衆漢官以徭役重科訴於管戸部事貝勒徳格類徳格類奏聞上遣巴克什龍什希福察訊差役重科之由所訴皆虚上諭管禮部事貝勒薩哈廉曰此輩皆忘却得遼東時所受苦累而為此誑言耳若不申諭使之豁然曉暢則此些少之費動為口實矣於是薩哈廉奉上命集衆官於内廷傳諭曰爾衆漢官所訴差徭繁重可謂直言無隱若非實不得已豈肯迫切陳訴然朕意亦不可隱而不言當從公論之朕意以為爾等苦累較前亦稍休息矣初爾等俱分隸滿洲大臣所有馬匹爾等不得乘而滿洲官乘之所有牲畜爾等不得用滿洲官强與價而買之凡官員病故其妻子皆給貝勒家為奴既為滿官所屬雖有腴田不獲耕種終歲勤劬米穀仍不足食每至鬻僕典衣以自給是以爾等潛通明國書信往來幾蹈赤族之禍自楊文朋被訐事覺以來朕姑宥爾等之罪將爾等拔出滿洲大臣之家另編為一旗從此爾等得乘所有之馬得用所畜之牲妻子得免為奴擇腴地而耕之米穀得以自給當不似從前之典衣鬻僕矣爾等以小事來訴無不聽理所控雖虚亦不重處是皆朕格外加恩甚於待滿洲者也至於困苦之事間或有之然試取滿洲之功與爾等較之果孰難孰易乎滿洲竭力為國有經百戰者有經四五十戰者爾等曾經幾戰乎朕遇爾等稍有微勞即因而擢用加恩過於滿洲若與滿洲一例較傷論功以為陞遷則爾今之為總兵者未知尚居何職也爾等訴稱苦累甚於滿洲盍向熟諳差役者問之若以滿洲相較輕則有之甚則未也古語有云有家者能養賢則取國而國可得有國者能養賢則取天下而天下可得此爾等所素知也是以朕及貝勒之家各量所有均出之以養上天畀我之民此即古聖人所謂養賢以及萬民之義也他國之主皆斂民間財賦以供一已之用有餘方以養人我國賦稅朕與諸貝勒曾有所私用乎我國民力朕與諸貝勒曾有所私役乎以私事而妄糜國賦役民力以廣修宫室不以國事為念止圖一已便安爾等自當諫朕今朕為國家朝夕憂勤荷天眷佑殊方君長頭目接踵來歸猶恐不能招致故解衣衣之推食食之然一切賞賚之需皆自八家均出何曾多取一物於爾等乎至國中年歲偶歉八家即均出米粟賑濟貧民朕與諸貝勒又散給各旗滿洲䝉古漢人贍養之其新附之䝉古漢人瓦爾喀虎爾哈卦爾察以及舊滿洲漢人䝉古等凡貧窮者則又給與妻室奴僕莊田牛馬衣食贍養何可勝數此皆爾等所明知者爾等曾奏云一切當照官職功次而行之我國家地土未廣民力維艱若從明國之例按官給俸則勢有不能然䝉天眷佑所獲財物原照官職功次加以賞賚所獲地土亦照官職功次給以壯丁從前分撥遼東人民時滿漢一等功臣占丁百名其餘俱照功以次給散如爾等照官職功次之言果出於誠心則滿漢官員之奴僕俱宜多寡相均乃爾漢官或有千丁者或有八九百丁者餘亦不下百丁滿官曾有千丁者乎朕若不任爾等多得不念爾等苦累豈不將滿洲漢官戸下人丁通行計算照官職功次再為分撥乎倘如此分撥爾千丁者不識應得幾人也滿漢官民雖有新舊皆我臣庶豈有厚薄之分乎滿洲出兵三丁抽一今令爾等亦與滿洲一例三丁抽一為兵爾等以為何如乎今滿漢均屬一國人民爾等何竟不知差徭之少倍減於滿洲而滿洲差徭之多實踰爾等三十餘項也諭畢總兵官石廷柱等奏稱控訴之事臣等不知皆衆備禦所為遂將為首八人執之薩哈廉奏聞上曰諸臣既云不知所執備禦八員可竝釋之倘治其罪後有苦累亦更無敢言者矣各官及所執備禦皆勿令謝恩若謝恩則是欲罪而復赦之也天聰九年乙亥六月辛丑上諭諸大臣曰皇考所遺人民能愛養之使漸富庶此即為臣子者之孝思也先時八貝勒家諸事俱奉朝廷法度今貝勒等凡有工作不遵朕制額外修造勞苦百姓試思民不得所逃亡離叛户口減少是違皇考之志有虧孝道且無異於助敵長寇也兹者荷䝉天佑朝鮮賓服䝉古向稱强盛輕視我邦今亦舉國歸附稽首來朝朕嘗以為仰承天眷道在養民凡察哈爾䝉古漢官虎爾哈卦爾察新舊歸附之人皆宜恩養故時時以此為訓而貝勒等不遵朕命遇有所獲互相爭競夫善養人者何論大小賢愚隨才器使俱有裨益譬如刊伐則用斧斤宰割則用鋩刃濟用於臨時必須預養於平日豈有養人而不得其益者乎爾等大臣不能匡諫諸貝勒知小民之疾苦而不以告及見驕縱之人又不能切責之其何以為大臣也爾等宜勉力為國勿求逸豫且朕於新舊人等常憫恤勿忘隨時愛養每加賞賚以招徠逺人勤求治道非不憚勞也不過為國與民耳若疆圉大定民生安樂國運昇平則安富尊榮貝勒大臣實共享之茍於前此歸附之人不能撫育後雖拓地開疆亦何以安輯之哉崇徳元年丙子四月丁亥上受尊號禮成諸貝勒大臣上表慶賀上諭曰朕以涼徳祗承丕緒加受尊號懼無以慰衆望爾等勸進再三屢辭弗獲今敬告天地允受尊號爾諸貝勒大臣當同心輔政恪共厥職以匡朕之不逮正已率屬各殫忠誠立綱陳紀毋圖小利儻能建立功名朕當隆以爵賞尤須撫衆恤民君臣一徳庶幾上合天心下遂民志如此則明良喜起政治咸熙萬民樂利天益佑助之矣崇徳二年丁丑六月甲子以恭順王孔有徳懷順王耿仲明智順王尚可喜協同武英郡王阿濟格攻克皮島各賜銀幣等物諭曰朝廷用人授以高爵厚祿使之安富尊榮者無非欲其感恩圖報贊襄治理有禆於國家而已朕於爾三王既以殊恩拔擢情同子弟封以王爵寵眷有加爾等宜感激奮勉恪守典常乃不勤思報效勉竭忠誠以輔助國政反縱所屬將士悖違法度恣意妄行朕甚不悅爾等有統率之任知他人有亂法者尚應責之乃身先作慝朕復何賴焉古語云爭小利者不受大益爾等何不勉圖大益而顧貪小利也嗣後行師務嚴飭將士毋蹈故轍以佐成大業其共朂之七月辛巳上諭諸漢官曰朕於爾等新附各官與舊臣一體撫育更或優於舊臣俱免徭役今舊臣中有如爾等之徭役獲免者乎若以功論諸舊臣隨朕多年身經百戰攻城則克遇敵則勝用能大造我國以有今日是舊臣之宣力實多至於爾等漢官或乘時歸順或窮迫來降更有陣獲而養之者何嘗攻城䧟陣身攖矢石志捐踵頂效死力戰乎以舊臣之功較之爾等彼此懸殊無俟朕言然而朕待爾等曾不減於舊臣昔年爾諸臣中有與明國往來行諜背叛逃亡者事泄被誅父母兄弟妻子離散又管轄爾等者强取財物爾等如在水火之中苦無容身之地自朕嗣位以來爾等諸臣有先與明交通者朕知其罪而赦之其無故誅求者復行禁止别立旗分予以生全出諸塗炭愛養有加今爾等已富貴矣乃不知感戴朕恩仰酬撫育以效力疆場約束士卒凡遇滿洲官兵致死前戰爾等視同陌路不相救援尚得為有人心者乎前牛彔章京張成徳曾獲敵船二􅃗俘三十八人爾等雖不能奮前力戰若能如張成徳之俘獲敵船猶為有益此時不肯竭力不圖報效更何以為竭力報效之地哉爾等但以空言欺飾如所云勿殺人勿掠民勿刦奪財物當行仁義我為國家分憂也我為朝廷效力也如此陳奏者頗多及行師之際經朕誥誡再三爾等輒違朕訓反身先倡率徇縱士卒攘奪殃民亂法滋甚則爾等之欺詐虚偽不可信任朕已洞燭之矣崇徳三年戊寅正月己卯都察院承政祖可法等奏稱禮部諭令生儒應試滿洲䝉古漢人家僕皆不准與試請分定取中額數准額取十名以十人換出上遣大學士范文程剛林學士羅碩啓心郎索尼諭之曰前取遼東時其民人抗拒者被戮俘取者為奴朕因念此良民在平常人家為奴僕者甚多殊為可憫故命諸王等以下及民人之家有以良民為奴者俱著察出編為民戸又兩三次考試將少通文義者即拔為儒生今在各家充役之家人間有一二生員然非先時溢行占取者可比皆攻城破敵之際或經血戰而獲者有之或因陣亡而賞給者亦有之即如克皮島時滿洲官屬兵丁效死力戰不若爾漢人泛同賓客坐視不顧是以此次所得之人皆以死戰擒獲及因陣亡而賞給者乃欲無故奮之則彼奮力之勞捐軀之義何忍棄之若另以人補給所補者獨非人乎無罪之人强令為奴亦屬可憫爾等所奏止知愛惜漢人不知愛惜滿洲有功之人與補給為奴之人也七月丁丑上諭都察院承政張存仁等曰爾等果盡忠為國凡有見聞當秉公入告實力舉行則委任爾等庶為有益若禮部承政祝世昌所奏徇庇漢人甚為悖謬若滿洲官庇護滿洲䝉古官庇護䝉古漢官庇護漢人彼此不和乃人臣之大戒譬諸五味止用酪則過酸止用鹽則過鹹不堪食矣惟調和得宜斯為美耳今滿洲䝉古漢人彼此和好豈不為善乎爾等聞祝世昌之言絶不㕘奏是爾等之失也昔曾子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎爾等若能時時省察其身則可以寡過矣是日上諭侍臣曰䝉天眷佑遠邇降服乃我國方興之會也爾等固山額眞大臣以上正為國憂勤加意治道共立功名之時朕與和碩親王多羅郡王多羅貝勒固山貝子所行何無一人直指得失而陳奏者從前因爾等臨陣退縮或行伍廢弛及私藏財物從而加罪者有之曾有因直諫而遽加罪者乎爾等衆大臣見人之善不喜而舉之見人之過不以為切已而訶責之黙然以處迨其獲罪始羣起而共議此皆爾等徒尚詐偽以為與已無渉故也夫古之人見賢才雖仇敵亦薦舉而與之同升見不善雖姻戚必痛懲而不少寛假如此乃眞心為國之大臣也若緘黙不言則賢者何由而勸不肖者何由而懲豈大臣為國之道不過顧身家貪富貴為竊位茍祿之人而已於國家有何裨乎今爾大臣中有因戰功令管固山及六部承政者有臨陣雖未有戰功因辦事精勤正直盡職遂令管固山及各部承政者既以正直而舉為大臣豈可因富貴之後遂變其初心乎夫止知貪圖富貴而不能直言進諫乃為逢迎諂媚之人朕素所不喜且不以正直自持富貴安能常保乎國恩亦豈能常受乎彼時悔無及矣爾等身為大臣不憂國不勤政不殫心襄贊以成至治上天下民將何望邪崇徳四年己卯八月辛亥上曰昔金世宗大定帝見稱於後世號為小堯舜古者堯之位不傳於子而明揚側陋使舜居之堯時有九年之水民不得耕使伯鯀治水無功舜遂殛之而任其子禹禹之治水也八年於外憂勤為國三過其門而不入不顧其妻子時雖有九年之水以堯舜在上民無饑饉之患舜之位亦不傳於子以禹之賢克底厥績而禪以位焉故後世之人咸稱堯舜為聖君歴考遼金元之主皆未有如大定帝者故後世以堯舜為比大定帝嘗曰諸王内或有過愆我不隱匿而言之彼且以我為苛察若知而不言黙以容之彼將益肆其巧詐矣遇此等事實難區處今朕亦然見人之過而言之無隱則或以朕為苛察若知其過而不言則又非公正之道從來君明則臣勞而民安君庸則臣逸而民危朕豈不惜臣工勞苦但當此天心眷佑之時正我君臣勵精圖治之日爾諸王貝勒貝子大臣等若不各加勤勉朕以一身宵衣旰食亦復何為朕將安居獨處一二月以靜觀爾等爾等雖在大清門外懇求朕必不汝聽也大清太宗應天興國𢎞徳彰武寛溫仁聖睿孝敬敏昭定隆徳顯功文皇帝聖訓卷二
