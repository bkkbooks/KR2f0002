body:
  text: 欽定四庫全書大淸太宗應天興國𢎞徳彰武寛溫仁聖睿孝敬敏昭定隆道顯功文皇帝聖訓卷一論治道天聰九年乙亥五月己巳上召集文館諸臣諭之曰朕觀漢文史書殊多飾辭雖全覽無益也今宜於遼宋金元四史内擇其勤於求治而國祚昌隆或所行悖道而統緒廢墜與夫用兵行師之方畧以及佐理之忠良亂國之姦佞有闗政要者彚纂翻譯成書用備觀覽至漢文正史之外野史所載皆係妄誕此等書籍傳之國中恐無知之人信以為眞當停其翻譯又見史臣稱其君者無論有道無道槩曰天子殊不知皇天無親惟徳是輔必有徳者乃克副天子之稱今朕承天佑為國之主豈敢遂以為天之子為天所親愛乎儻不行善道不體天心則天命靡常寧足恃耶朕惟有朝乾夕惕以仰邀天鑒而已崇徳元年丙子七月丙辰上諭大學士希福剛林范文程曰科爾沁國土謝圖額駙有名馬號曰杭愛朕曾以甲十副易之彼不與䝉古察哈爾汗向彼索馬勢如强奪止予一胄竟取之從此科爾沁諸貝勒為之解體察哈爾汗又以一胄送阿祿部落濟農索馬千匹阿祿濟農曰豈有一胄而易馬千匹者乎此直欲啟釁而來侵我耳不可不與遂與馬五百匹從此阿祿諸貝勒亦為之解體科爾沁國卓禮克圖親王有一鷹能横捕飛鳥察哈爾汗又遣人往索卓禮克圖親王欲不與土謝圖額駙勸令與之既取其鷹一無所償竝送鷹之人亦不令見如此貪横人心安得而服耶今各處䝉古每次來朝厚加恩賞因此俱不忍離我而去雖去時猶屬戀戀而䝉古各國亦從此富足安閒由此揆之以力服人不如令人中心悅服之為貴也崇徳二年丁丑六月甲寅上諭諸王羣臣曰頃者朝鮮之役軍中甚無紀律見利當前竟忘國憲朕向爾等屢行申飭者非欲自取之也今䝉上天眷佑凡財幣牲畜諸物咸備不可勝用胡可不知止足耶朕為此言亦非怵爾等以威也爾等非不知畏懼故違朕禁令但因黷貨之故往往藐法不顧為可恨耳不知財貨乃身外之物多藏無益縱不義而富能有不死之術以長享之乎太祖時大臣今存者幾人蓋人生如寄何必過為營謀子孫賢則自能顯達子孫愚雖積財遺之何益要以勉力功名使勲績垂於後世乃為貴耳古語云天有四時地生萬物天下有民聖人牧之故春道生萬物榮夏道長萬物成秋道斂萬物盈冬道藏萬物靜盈則藏藏則復起莫知所終莫知所始莫進而爭莫退而遜守國如此則與天地合徳皇考太祖創業垂統及朕嗣位以來統一䝉古收服朝鮮版圖式廓人民繁庶自今以後宜思所以宣布法紀修明典常為保邦致治之計若當我國振興之際不勤修國政他日將欲修之恐無及矣嘗觀前代勵精圖治法制詳明者國祚必永怠忽政事廢弛紀綱者國勢必危蓋治國之道如築室然基址堅固庀材精良者必不至速毁世世子孫可以久居其或茍且成工者則不久圯壞梓材作誥古人所以諄諄垂誡也嗣後爾等勿徒財賄是耽各宜竭盡忠誠匡襄國事朝廷庶績咸熙則爾等勲名長保使子孫永守勿替豈不美哉崇徳三年戊寅七月丁丑上召内𢎞文院大學士希福内國史院大學士剛林學士羅碩等諭曰朕從來不喜以空言文飾要取虛譽昔漢文帝欲建一臺計費百金以為百金乃中人十家之產遂止而弗建朕以為此亦空言取譽殊不足取朕䝉天垂佑各國臣服財用饒裕當此之際我國新舊人等有窮困無妻奴馬匹者若不急加恩養更於何時養之人君宵旰勤勞以修治道國計民生最為要務理財裕國亦為民而已今養此窮困之人財物牲畜何物不有若吝惜而不肯養人留之何用耶訓諸王天聰九年乙亥六月癸卯上諭諸貝勒大臣曰昔太祖時曾禁諸貝勒子姪不許郊外放鷹蓋以擾害人民蹂踐田園傷殘牲畜故也今聞違背禁令仍復擾民此風漸不可長放鷹之人應自備牛羊以供諸人食用不宜需索民間若剝削小民而取其牲畜貧民何以堪此且朕凡行師出獵雖嚴寒之時皆駐蹕郊野不入屯堡亦恐耗損民物耳嗣後放鷹之人如擾民不止事發之後決不輕恕語云涓涓不塞將為江河熒熒不救炎炎柰何蓋以凡事皆當防微杜漸縱弛之後則難整頓若禁之不早後悔無及也七月壬戍上諭貝勒阿巴泰曰爾嘗自謂手痛似覺不耐勞苦不知人身血脈勞則無滯爾等惟圖家居佚樂身不渉郊原手不習弓矢忽爾行動如何不痛若能努力奮勵日以騎射為事何痛之有爾諸貝勒各有統帥之責若不親率士卒騎射教演精勤孰肯專心武事平日既未嫺熟一旦遇敵何以禦之試思丈夫之所重者有過於騎射者乎騎射之藝精於勤而荒於嬉不可不時加練習爾諸貝勒若能服勞奮力不偷旦夕之安恪勤政事惠養人民克敵制勝削平諸國斯不負先帝之志能報養育之恩既克全孝道亦可謂為國盡忠矣如不思效忠盡孝惟各為其家財貨牲畜是積罔卹人民怠玩政事異日䝉天眷佑大業克成當諸貝勒大臣叙功之際無一勲績足錄雖悔何益也且書之史冊賢否攸分可不懼乎崇徳元年丙子七月丁卯上諭曰諸固山貝子爾等敬聽朕言昔太祖時我等聞明日出獵即豫為調鷹蹴毬若不令往泣請隨行今之子弟惟務出外遊行閒居戲樂在昔時無論長幼爭相奮勵皆以行兵出獵為喜爾時僕從甚少人各牧馬披鞍析薪自爨如此艱辛尚各為主效力國勢之隆非由此勞瘁而致乎今子弟遇行兵出獵或言妻子有疾或以家事為辭者多矣不思勇往奮發而惟耽戀室家偷安習玩國勢能無衰乎崇徳二年丁丑四月丁酉上御翔鳳樓集和碩親王多羅郡王多羅貝勒固山貝子固山額眞都察院承政及新設議政大臣諭曰嚮來議政大臣或出兵或在家有事諮商人員甚少儻遇各處差遣則朕之左右及王貝勒之前竟無議事之人矣議政雖云乏人而朕不輕令妄與會議者以卑微之人參議國家大政勢必逄迎取悅夫謟佞之輩最誤國事豈可輕用今特加選擇以爾等為賢置於議事之列殫心事主乃見忠誠為國宣勞方稱職業爾等大要有三啟迪主心辦理事務當以民生休戚為念遇貧困窮迫之人有懷必使上達及各國新順之人應加撫養此三者爾等在王貝勒前議事皆當各為其主言之朕時切軫念者亦惟此三事耳爾等凡有欲奏之事不可越爾固山額眞如某事應施行某事應入告當先與固山額眞公議然後奏聞彼無知之輩往往以進言者謂之讒譖夫善則曰善惡則曰惡何所忌諱而不言使有明知其人以惡意誤其主而不入告者豈人臣乎若私結黨援反欲傾害善人指以為惡妄行入奏所謂讒人乃此類也聖經有曰欲齊其家先脩其身身脩家齊而後國治爾等若謹好惡之施審接物之道御下以義交友以信如此則身脩矣孝其親悌其長敎訓及其子孫親戚如此則家齊矣身脩家齊而國不治者有是理乎爾等當存忠直之心以為國愼毋怠忽有負朝廷太公曰閒居靜處而誹時俗非吾民也朕觀䝉古察哈爾林丹汗悖謬不道至於亡國未聞其臣有斥言其主所行悖亂者嗣後朕或有過舉爾等即當面諍試思以諫諍之故而斥責者為誰降革者為誰儻諫而不聽靜以俟之可也若既不能諫而徒於退後咎其主上之失議其國事之非豈人臣之誼乎或更有將各旗妄分彼此明知本旗有悖亂之人隐匿不言及人言之反加庇護者尤朕心之所深惡者也八旗皆朝廷之人但宜懾服姦宄撫恤困窮使之各安統轄又何彼此之可分乎嗣後有將新分給之虎爾哈瓦爾喀使之逃亡饑死致牛彔中缺額者朕即以不能養育之王貝勒下食口糧家人補足其數夫王貝勒等聚財積穀畜養馬匹豈止為一身享用要皆為子孫計也不知子孫果賢縱無所遺彼寧不能自立子孫若愚雖有所遺豈能常守徒自勞苦為他人積聚耳夫積穀所以備荒而養窮民也財帛馬匹所以為國而賞有功之人也財物牲畜固不可妄費亦不可過於吝惜朕所以令爾等撫養窮民及新附之人者蓋先哲有言賞一人則勸者衆罰一人則懼者衆今䝉天眷佑諸國已平獨明國尚在賞罰可不明乎又諭諸王貝勒等曰昔金熙宗及金主亮廢其祖宗時衣冠儀度循漢人之俗遂服漢人衣冠盡忘夲國言語迨至世宗始復舊制衣冠凡言語及騎射之事時諭子孫勤加學習如元王馬大郭遇漢人訟事則以漢語訊之有女直人訟事則以女直語訊之世宗聞之以其未忘女直之言甚為嘉許此夲國衣冠言語不可輕變也我國家以騎射為業今若不時親弓矢惟耽晏樂則田獵行陣之事必致疎曠武備何由而得習乎蓋射獵者演武之法服制者立國之經朕欲爾等時時不忘騎射勤練士卒凡出師田獵許服便服其餘俱令遵照國初之制仍服朝衣且諄諄訓諭者非為目前起見也及朕之身豈有習於漢俗之理正欲爾等識之於心轉相告誡使後世子孫遵守無變棄祖宗之制耳崇徳三年戊寅七月丁丑上諭和碩親王多羅郡王多羅貝勒固山貝子等曰爾等為朕股肱耳目凡舉錯好惡當一秉至公勿仍向日偏私之習蓋人誰無過貴於能改爾等若見朕所行有未當處即當直言進諫朕亦樂於聞過以便改圖今國家仰䝉天祐爾等財物亦既充裕家產亦既豐饒其在下之人或有窮困而衣食不足者或有無故寃抑者爾等與其任此輩在外嗟怨退有後言何不令窮困寃抑之人親自陳奏乎且此等之人爾等既知之亦當以某也窮困某也寃抑入告於朕如窮困之人不加恩養寃抑之事不為昭雪則朕之過也朕嘗見有生計充餘身享富厚猶不知足營求不已戚戚為憂此等之人甚屬卑鄙至有有功之人衆人舉而用之彼反視若仇敵無功之人衆人錯而舎之彼反加以恩養獨不思朕之舉錯皆因衆人之公不存偏私之見彼乃惡衆人之所舉愛衆人之所錯其意何居若衆之所舉或有誤用衆之所錯或有寃抑則不妨秉公直言期於至當不然不愛有功之人而反愛無功有罪之人是豈特無忠義誠實之心且懷悖逆之志故如此耳似此居心行事若被有功之人如孟坦告訐則爾等所愛無功之人必如孟魁之族皆坐死矣即爾等之身亦受黜辱所愛無功之人尚得在爾左右乎人有言曰越山易越法難國法攸昭天鑒不爽朕心時加敬謹爾等安能妄越於法耶又諭諸王貝勒貝子等曰我國家䝉天眷佑漢人䝉古虎爾哈瓦爾喀在在歸附皆分給與諸王貝勒貝子令加恩養因爾等有加恩養者有不加恩養者是以朕前此屢經誡諭乃猶不加撫恤致降人竊謂曰我等同來事主某已富貴某猶貧困在外嗟怨者有之來告於朕者亦有之夫降附之人棄其父母之國而來歸誠宜加意撫綏使之得所乃朕諭爾等恩養爾等反以為煩苦不遵朕㫖今彼來告朕心惻然無言可答爾等既堅忍如此諒必有定見應如何答彼之辭可即奏朕以便如爾等之言答之崇徳六年辛巳二月己未上集諸王貝勒羣臣於篤㳟殿諭之曰牛彔下人多有貧乏者皆係牛彔章京及撥什庫等嗜酒廢事之所致也昔皇考太祖性不飲酒爾時羣臣庶民凛遵教訓故國勢振興諸臣迄今殷富皇叔貝勒嗜酒其部下臣民俱效之故皇叔之政漸衰而部下之臣民漸貧自正藍旗莽古爾泰徳格類在時躭於麴糵其部下之臣及夲旗下人皆相習成風以致敗亡似此沉湎廢事致令牛彔貧窮者諸王貝勒貝子公等何不查明議處屬下貧窮者何不加恩贍養若令徧察舉國之衆或勢有不能今止各查該管之人實屬至易儻牛彔章京不職何為不即為更置且此貧窮牛彔豈平時不給爾以俸餉行兵獨吝爾之功賞比之衆人或有同異耶抑於衆人之外過派差徭耶豈此等牛彔與國人不同而天偏降之以霜雹旱澇之異災耶董率無方誰職其咎著將貧窮牛彔之該管章京及驍騎校小撥什庫俱解夲牛彔任竝離其兄弟歸他人監管其牛彔撥什庫員缺另選才能者補授又諭諸王貝勒大臣等曰爾等何不親率人習射耶子弟輩壯者當令以角弓羽箭習射幼者當令以木弓柳箭習射如不執弓習射好為博戲閒遊市肆者何不執之我國武功首重習射嗣後爾等當嚴加督率互相激勸崇徳八年癸未六月己卯上諭諸王貝勒貝子公等曰前諭王貝勒貝子公等將各所屬新舊人等加意恩養乃聞王貝勒等於近侍官員頻頻賜之以食至旗下官員守門護軍及新附之人竟不得沾恩養如此甚為失宜試思獨養官而不養民養賢而不養不肖官雖賢亦豈能獨立乎以上下相維之理言之必為在下之人所托命而後可為在上之人如無在下之人則統轄者誰役使者誰也朕幸承天眷以我兵之半往征明國遂能破其闗隘克其城池皆因撫綏各國俾傾心歸順勢大力强之所致若止恃舊日之兵豈能致此乎朕素於諸王貝勒貝子公等一切家事俱不預聞嗣後於新舊人等孰愛養有方孰漫不撫恤必加詳察爾諸王貝勒貝子公等共宜加意愛養其固山額眞護軍統領及近侍護衛等各宜啟迪其主凡見新舊窮苦之民即告知夲主給之衣食俾皆得所如此方可謂賢不然止圖一己之豐厚不以衆人為念衆人豈復有繫戀爾等之心耶此後凡新舊人有因不沾恩養自行陳訴者所告果實該管王貝勒皆坐罪若原告係騎兵將該管固山額眞一例治罪若係護軍將該管護軍統領一例治罪蓋善養人者國之要務不可忽也又有效力行間勤勞素著而不免窮困者亦有秉質椎魯拙於經營而甘處貧乏者此等之人該管牛彔章京察報固山額眞轉啟各王貝勒酌給僕役牛馬以贍養之如王貝勒貝子公等不能贍養即以不能贍養具疏奏聞俟朕贍養之其有不思隨征不畜馬匹止圖自養身家藉口貧乏者不許濫及察報之時各牛彔章京毋得徇庇親屬此番出征所獲牲畜財物必須撙節儉用豈可恃俘獲以為生計乎夫出師征伐以有土有人為立國之夲非徒為財利也至於厚生之道全在勤治農桑耳大清太宗應天興國𢎞徳彰武寛溫仁聖睿孝敬敏昭定隆道顯功文皇帝聖訓卷一
