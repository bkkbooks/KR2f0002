body:
  text: 欽定四庫全書太宗文皇帝聖訓序朕惟帝王誕膺天眷肇造丕基功德懋隆疆宇日闢有紀綱以昭大法即有謨訓以啓後昆方策具存燦然可考也若夫道兼作述業裕創垂以聖繼聖而巨烈鴻猷煥乎宇宙間者尤足冠百王而立極焉欽惟太宗應天興國𢎞德彰武寬溫仁聖睿孝隆道顯功文皇帝躬上聖之資承開天之運神武不殺寬和有制萬國向化而賓從庶績撫辰而就理峻德𢎞勳巍巍蕩蕩稱極盛矣至於命令誥誡誕播𢎞詞皆義切訓行理歸體要洪纎畢舉本末咸周而其大指之所存則首在於愛養生民旁求俊乂敕幾凝命惇典明倫大哉王言誠治平之極則也我皇考世祖章皇帝嘗命纂修未竟厥緒朕嗣膺厯服念切纘承爰命儒臣詳加編輯計一百一十一條分二十三類定為聖訓六卷既成因披陳莊誦朝夕繹思見夫旨原於精一義著於典謨上之可以正道揆焉下之可以昭法守焉書曰監于先王成憲其永無愆詩曰不愆不忘率由舊章自昔詩書所載莫不以紹衣為兢兢矧夫義蘊精深規模宏遠嘉言彞訓超踔古今朕用是覲揚光烈昭示來許後之子孫以此蘊之於心則為天德敷之於政則為王道範圍臣庶則為會歸之極垂裕後昆則為詒燕之謀尚其夙夜祗承以為致治保邦之本而迓祈天永命之休也是為序康熙二十六年三月二十七日太宗文皇帝聖訓序聖人之情因辭以見易曰修辭立其誠所以居業也蓋以通天下之志以成天下之務本乎至誠施諸命令無意於辭而理臻其極厯觀堯舜禹湯文武之世典謨訓誥釐然具存後人奉之為經列在學官為載籍首矧夫運際開天功存繼志制作侔造化教澤被生民天下之文章孰有大於此者乎欽惟太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝英姿挺出聖武布昭大智如神淵衷若谷及登寶位疆宇日增厚祿以養賢勤身而率下恩威所及大畏小懷政教所孚逺來近恱皇哉何化理之神也至若敷陳治道誨諭臣民不尚虛文惟崇大體謂行善所以事天而逺利始能服衆闡伊尹一德之訓稱曾參三省之言以勸農講武為立國之大經以考古讀書為服官之要務自立綱陳紀以逮服飾器物之間或即事以宣猷或因時而定制洪纖咸備張弛攸宜蓋察理精故見之也逺更事久故慮之也詳用能承藉丕基佑啓聖哲是誠億萬年繼往開來之極軌也順治中嘗因記注舊文纂修聖訓一書未竟厥緒聖祖仁皇帝特命儒臣詳加編輯事以類分凡二十有三言以條舉凡一百一十有一彚為六卷體要著明朕在宫中蒙皇考恩勤教育定省之時備聞祖訓嗣膺大統志切纘承晨夕披陳尋繹仰見心符道要語中機宜旨蘊閎深函蓋天地文辭昭晰彪炳日星垂裕後昆永昭法守用是勒為成書敬授剞劂頒示中外書曰聖謨洋洋嘉言孔彰又曰聖有謨訓明徵定保我子孫臣庶其誦習遵循永敬承於世世哉謹序乾隆四年十二月初十日欽定四庫全書史部六大清太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝聖訓目録詔令奏議類詔令之屬卷一論治道訓諸王卷二訓羣臣卷三謙德寬仁智略卷四求賢求言輯人心恤民勸農興文教卷五訓將勵將士懷逺人訓諸藩卷六恤降招降恤舊勞敦睦節儉謹嗜好禁異端臣等謹案太宗文皇帝聖訓六卷順治末世祖章皇帝編次未竟康熙二十六年聖祖仁皇帝續成凡一百一十一則分二十三門乾隆四年皇上御製序文刋布惟我太宗文皇帝纘承前緒益拓鴻基因壘崇墉觀兵坶野威稜震耀既逺邁成周至於敦敘羣倫正名百物禮樂大備書契肇興則與軒帝膺圖外奮涿野之威而內肅合宫之典者後先同揆誠以守成而兼創業奮武而並揆文蓋宰馭乎萬類者其聰明睿智必超乎萬類之上太祖有焉垂裕乎萬年者其制作精神必周乎萬年之後太宗有焉稱天上諡尊以經天緯地之大名義所稱也豐功偉烈史臣珥筆已恭紀琅函至于聖德所形聲律身度一舉一動效法乎乾坤一話一言表裏乎典誥者則恭傳天語具載斯編於以上彰祖德下啓孫謀理珠囊而握金鏡誠億萬世之法守矣乾隆四十八年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
