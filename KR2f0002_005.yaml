body:
  text: 欽定四庫全書大清太宗應天興國𢎞德彰武寛溫仁聖睿孝敬敏昭定隆道顯功文皇帝聖訓卷五訓將天聰三年己巳十一月庚寅上諭曰頃因克取遵化自固山額真甲喇額真及登城士卒俱以次賞賚者非以固山額真身自登城也以其督率盡善設備堅固故行賞耳嗣後凡攻城賞賚視此為例朕與爾等經厯險逺艱苦至此已䝉天佑克奏膚功然此猶佑我之小者後此之佑命錫福者更大有在也凡固山額真及大小諸臣尤宜加意約束本旗人員明白訓飭愛士卒如子弟申明歩伐止齊之法講求尊君親上之道則本旗士卒亦視爾等如父母平時則克遵教令臨陣時在爾等之前竭誠效命不違紀律矣各旗大臣果能如此所屬士卒又何至有陷於重罪者乎儻各旗大臣不勤加訓飭以致妄行姦盜不誅則紀律廢弛而為惡者益熾誅之則曽經效力之兵而以無知蒙罪又實可憫爾固山額真甲喇額真牛录額真當以此為念勤加教訓以副朕意且爾大小諸臣居平在家時不嘗厚自期望以為安得一日於上與諸貝勒前盡忠效力以自見乎今已任用正諸臣盡忠效力之時何初念頓忘而遂狃於貪得耽於怠惰茍且偷安一至於此也我國家儻䝉天眷佑大業既成若輩欲身享太平膺顯榮履富厚其可得邪今後各宜克勤厥職毋替朕命天聰五年辛未正月己亥上幸文館問巴克什庫爾纒所修何書對曰記注上所行事上曰此史臣之事朕不宜觀又取巴克什達海所譯武經觀之内有云昔良將之用兵有饋簞醪者使投諸河與士卒同流而飲夫一簞之醪不能味一河之水而三軍之士思為致死者以滋味之及已也上覽至此諭曰觀古史所載將帥必體恤士卒如我國額駙顧三台與敵交鋒士卒有戰死者嘗以繩繫其足曳歸主將之輕蔑士卒若此何以得其死力乎七月戊戌上諭諸臣曰盖聞古來用兵征伐有道者昌無道者廢上天應感之理昭然不爽故自恃其力而恣行殺奪未有不敗者也克盡其道而力行仁義未有不興者也天運循環但易其君不易其民若天意所與則敵國之民即我民也今日天心所向豈能預知朕惟欲體仁行義制敵養民而已爾諸臣當申明法紀教誡士卒恪遵訓諭切識於心務期力行正道無作姦邪不然為姦為慝肆行悖亂則或責或誅皆自取之至俘獲之人勿離散其夫妻父子勿掠取其衣服爾諸臣以及士卒各宜凛遵庚子上召集諸將諭曰瀋陽遼東之地原非我有乃天所賜也今不事征討坐視漢人開拓疆土修建城郭繕治甲兵使得完備我等豈能安處邪朕是以不惜財帛及與朝鮮通市所得貨物盡與䝉古易其馬匹興師致討此行儻荷天佑克奏厥功凡俘獲之人勿離散其父子夫婦勿掠取其衣服當加意拊循以副朕戡亂寧人之意爾諸臣於各軍士宜諄切曉諭若止於𫝊諭時唯唯聴命退而遂忘自不免生事横行致干罪戾矣朕今不自暇逸躬率大軍前往或彼被困而來降或天垂佑而致勝則飲至休兵三軍解甲定有其時自征明國以來攻城野戰所向必克彼明國屢戰屢敗勢同枯朽而我常有懼心者以彼雖不長於騎射而於戰陣之時曉習文武法律故也昔金伐宋遇宋將宗澤金兵十三戰皆敗隨有宋一將率兵來援欲戰有城守將沮之曰當此六月酷暑揮扇納凉尚不能堪豈能擐甲而戰乎諸兵聞之皆無鬭志宋兵遂潰以一言之失而城竟為金所得如貝勒阿敏駐守永平時曽以我兵為弱曰如此安能克敵彼貝勒之言若此士卒孰肯用命又如額駙顧三台朕非以其臨陣怯懦不能稱職革固山任也當進攻昌黎時本旗一卒被傷至死以繩繫其足曵之而歸夫戰則用之而死不加恤誰復效死直前邪必也死則恤之傷則臨視調治之乃可為主帥固山額真果能體恤士卒則人皆效死願授命於主將之前矣我軍總計雖衆若固山額真梅勒額真甲喇額真牛录額真各就所屬而誡諭之不難遍及要在申明法令愛惜士卒則人人競奮建立功名豈不美乎八月癸卯上諭䝉古諸貝勒曰朕荷承天眷爾諸國遵約㑹師師出以律不宜有異今此次伐明儻䝉天佑得入其地惟拒敵者則戮之慎毋擅殺良民俘獲之人不得離其父子夫婦不得掠取其衣服違者奪其所獲仍依定例鞭責管兵將領各於所屬詳明曉諭士卒不得擅離部伍恣行捜掠其悉遵軍令毋違天聰八年甲戌十二月壬辰上命管歩軍梅勒章京霸竒蘭甲喇章京薩木什喀率領官兵往征黑龍江地方諭曰爾等此行道路遥逺務奮力直前慎毋憚勞而稍怠也俘獲之人須用善言撫慰飲食甘苦一體共之則人無疑畏歸附必衆且此地人民語音與我國同攜之而來皆可以為我用攻畧時宜語之曰爾之先世本皆我一國之人載籍甚明爾等向未之知是以甘於自外我皇上久欲遣人詳為開示特時有未暇耳今日之來盖為爾等計也如此諭之彼有不翻然來歸者乎爾等其勉體朕意大丈夫凡受委任當圖報稱語云少壯不努力老大徒傷悲誠哉是言若此時不力圖建樹異日雖悔何益耶崇徳元年丙子九月辛未上遣都察院承政阿仆達爾漢大學士范文程剛林學士詹霸胡球等諭凱旋多羅武英郡王阿濟格固山額真篇古拜尹圖阿山葉臣圖爾格達爾哈葉克書譚泰等曰朕聞我軍後隊方至舊遼陽河沃黒渡口爾等已抵家二日矣爾等當速往迎之朕畀爾以心膂重任者為愛養此兵民耳朕一人之心思能徧及乎君享康寧臣居尊顯俱兵民是賴即爾等功名亦藉士卒之力乃不思效力死戰之士而先自還家漠不相顧於心奚忍邪忘死戰之士卒令長途勞苦此後士卒誰肯為用命邪衆大臣奏曰皇上明訓臣等願親自往迎上曰固山額真等免其親往其下梅勒章京可選能辦事者往迎之崇徳三年戊寅八月癸丑上命和碩睿親王多爾衮為奉命大將軍以多羅貝勒豪格多羅饒餘貝勒阿巴泰副之統左翼軍多羅貝勒岳託為揚武大將軍以多羅安平貝勒杜度副之統右翼軍兩路征明召集出征諸王貝勒大臣宣示軍律諭曰征伐非朕所樂為也朕常欲和而明不從是以興師耳有不抗拒我兵及不便攜來者若擅行誅戮則殺人者與主兵者均難辭咎甚非朕撫安黎庶之意也不抗拒者慎勿殺之不便攜來者亦勿加擾害又諭各官曰丙子嵗多羅武英郡王領兵征明克昌平州爾等以貪掠獲罪者甚多朕豈願爾等犯法樂於加罪懲前此妄行貪暴之人正欲警之於後使不為亂耳且朕見爾等有罪甚為惻然朕非誇詡以古人自擬嘗閱古史云夏禹道遇罪人而泣侍臣曰此犯法有罪之人王何為而泣也禹曰堯舜時政教徳澤宣布於民故人無犯法今我之泣非為囚也我之政教徳澤不如堯舜致有罪人故泣耳朕見爾等有罪亦甚為惻然也爾等宜互相勉勵恪遵軍令以行毋或怠玩從事今䝉古漢人朝鮮諸國俱已歸附軍營壯盛爾等勿徒自恃强勇以威懾人各宜申明紀律無或厭倦盖爾等乃衆所觀瞻也若能自處以禮濟之以和則歸附各國必以為我國强而有徳勇而有禮益加悦服矣凡為主帥之人於臨陣之際使徒計一已之功而不念兵之死傷軍之敗䘐及國之聲名有損非主將也興師致討當思於國有益於已無愆凡軍中議事遇有意見悖謬者即宜在彼勸諭毋得緘黙不言而徒於還時託詞自解亦有在彼故出微辭而辯時則云我曽如是勸諭者皆不足據必在彼明言於衆而衆不從始可於還時辯理也九月癸亥上命奉命大將軍和碩睿親王多爾衮等率左翼軍征明敕曰古帝王興師克敵撫定疆宇必選擇於衆拔一良將特授兵權則軍有所統而大事始定今因明國不願講和樂於干戈故命爾和碩睿親王多爾衮充奉命大將軍授以敕印率左軍西伐爾其同豪格貝勒饒餘貝勒與滿洲䝉古漢軍衆固山額真僉慮協謀擇善而從勿以受命重而邀功勿以將士勇而輕敵凡駐營壘嚴設偵探小心提防勿得少怠務須信賞必罰激勵將士破彼邊關直入其境多謀定策密察敵人之機聲東撃西黙運乘便之智出其不意攻其無備至於待將士勿䕶所愛勿蔽所憎有衝鋒破敵奮勇先登者必破格優賞仍録其功以奏參遊以下有敗陣及違軍律者先斬後奏尚其欽哉勿違朕命崇徳六年辛巳四月甲寅上召内院諸臣進清寧宫命讀元史至世祖忽必烈遣丞相伯顔率師征宋時值炎天恐行兵不利敕俟入秋再舉伯顔奏云宋之據江海如窮獸之負嵎今已困彼旋復縱之則逸而逝矣遂南征滅宋統有天下上遣大學士范文程剛林等至篤恭殿傳諭有罪王貝勒貝子公大臣等曰元世祖恐炎熱敕伯顔俟入秋伐宋伯顔執論必舉遂興師滅之今汝等不圍逼錦州屯兵逺處任意畋獵急圖歸家視彼為何如也朕非窮究爾等但以伯顔勤國之心令爾等知之耳崇徳七年壬午十月壬子上命多羅饒餘貝勒阿巴泰内大臣圖爾格等率兵征明親送至郊外諭之曰朕屢欲與明議和彼國君臣不從是以命爾等率兵往征爾等勿以我兵强盛自弛防範古云驕敵者敗其敬慎戒備以行我國固山額真䕶軍統領於行間勇士多不肯以其所長上聞如此則勇戰之士何以激勸凡新歸䝉古漢人必一體相待儻或岐視致有困乏亦非為國效忠之臣也我軍至明彼或遣使求和爾等即應之曰我等奉命來征惟君命是聴他無可言爾如有言其向我君言之必吾君諭令班師方可退兵可將朕此㫖向外藩將士再三曉諭勵將士天聰四年庚午二月辛亥上燕坐諭羣臣曰昨夜攻永平城副將阿山葉臣與猛士二十四人冒火奮力登城乃我國第一等驍勇人也其二十四人䝉上天眷佑幸俱無恙次日召伊等進見朕心愴然幾不能忍此等猛士與巴圖魯薩木哈圖及他處先登驍勇出衆之人前已有㫖後遇攻城勿令再登及攻昌黎縣薩木哈圖又復與焉以後此等捐軀建功之人勿得再令攻城但當令在諸貝勒固山額真左右遇衆對敵之時與之同進若彼欲自攻城亦當止之即或厮卒中有一二次率先登城立功者亦不可再令攻城以示朕愛惜材勇之意天聰五年辛未八月乙卯總兵官額駙佟養性部下卒一人攻臺中礮折足上聞之遣醫往治因日久不能療創愈甚奏聞上惻然諭養性及諸臣曰若此者爾等當親視醫療如不能治何不早奏於朕遣醫治之今已日久恐治之無益矣爾等亦聞古良將之待其士卒乎於行兵之處有遺簞醪者慮不能徧飲遂投醪於河使士卒共飲其流三軍遂無不效死又吳起為將一卒生疽起親為吮之後其卒感激戰死此前事皆爾等所知也凡士卒有傷則調治之病則慰問之如此則士心皆願效死於主將之前矣懷逺人崇徳二年丁丑正月庚午朝鮮國王李倧率其文武羣臣自南漢山城出降伏地請罪上諭曰朝鮮國王既知罪來降朕豈有念舊惡苛責之理今後一心盡忠不忘恩徳可也前事毋再言及於是令李倧朝見禮部奏請李倧班次上諭曰以威懾之不如以徳懷之朝鮮王雖迫於兵勢來歸亦一國之王也命近前坐於左側大宴畢上命盡還李倧妻子子婦及羣臣家屬仍各頒賜有差訓諸藩天聰六年壬申四月癸未上召集科爾沁國土謝圖額駙幷其昆弟諸貝勒及札魯特敖漢奈曼阿禄各部落貝勒等諭之曰朕以察哈爾汗不道整旅徂征先期諭爾等率所部兵來㑹今爾等所率兵多寡不齊遲速亦異惟土謝圖額駙率來軍士甚多又不惜所蓄馬匹散給部衆疾馳來㑹足見立心誠慤憂樂相同朕甚嘉之若吳克善者則於朕心有所不慊矣札魯特諸貝勒亦屬實心效力至若巴林諸貝勒既託命於我自應身先士卒竭力戎行乃吝惜馬匹怠緩不前何邪爾同𩔖之喀爾喀諸貝勒為察哈爾所俘戮者有之矣離其夫婦者有之矣取其部曲祗存孑身者亦有之矣朕從大公起見興師來此正爾等奮志雪讐之日也今視爾等似猶有懼心者彼察哈爾能至我城下否我亦有懼心否爾塞特爾動輒託病果何病耶不念及國政而嗜飲無度為酒所困耳又阿禄諸貝勒為察哈爾所逐自奔投我國以來朕每謂當移營近地乃不遵朕言仍於逺處放牧復為察哈爾所掠且以所掠諸物獻於明國誑云滿兵進攻之後我入其地而得之以獻是彼指侵奪我國之名以誑告於明也屬國為人所襲朕猶有憾阿禄諸貝勒躬罹其害蓄怨自深豈不思仗朕力以復讐者乃竟不散給爾馬不多發爾兵僅以一旅之師勉强應命應俟班師日議罪至爾敖漢奈曼諸貝勒獨先他部來歸濟農移居瀋陽班第年少衮出斯巴圖魯身居本國汝等較巴林殊優然亦未為盡善也且朕所憂者惟恐八旗諸貝勒不體朕意或將汝等良馬美物欺而奪之耳若兩國貝勒聨姻締盟彼此相饋各出所願則可有不願者則勿與也儻有恃威强索者爾當奏聞崇徳八年癸未三月丙申上遣戸部啟心郎布丹内秘書院學士楊方興等齎敇往諭朝鮮國王李倧及其臣民曰朕自三田渡招服爾等王及臣民皆保全身家得受恩養非為一時之計也一則欲爾等感戴朕恩如同天地奕世不忘一則欲垂功徳於萬年耳厥後爾等乃違㫖出邊盜採人參肆行射獵潛與漢人私相貿易又遣僧人往來明國傳書餽送復遣發間諜紛紛不止遇明人船至故縱不行捕獲前約發舟師又遲延日月違期不至汛地寧非背朕恤養之恩乎凡此皆因主弱臣强所致古云主弱臣强者必簒位人主暴虐者必亂國王果執法而行孰敢如此倡亂王若行法而姦臣容有作亂者朕亦豈置而不問乎且爾朝鮮先曽事遼及金强遂轉而事金後復事元至明强爾始祖又轉而事明後倭侵爾境明曽發兵退之爾謂明之有恩者以此朕亦知之然皆已往之事爾先王因思報效明國當己未嵗明將杜松劉綎四路分兵侵我爾國遂助兵來戰彼時我豈有怨於爾國邪使爾能勝肯如我之保全恩養爾等容我國至今長存邪爾之報明於此盡矣我之再舉伐爾者乃問爾助明之罪豈似爾興無名之師乎然朕不念舊惡復加寛宥凡爾國王以及臣民安居樂業者皆朕之恩也當思共甘苦同休戚如朕不勝明更宜戮力疆埸以圖報稱豈可頓忘朕恩邪試取朕之恩與明國之恩一思之夫朕之恩及汝身猶生父也明之恩施於逺代猶已祧之祖也此盖爾不識天時以明為必不敗亡故不肯與絶耳以朕度之明有必亡之兆何以言之彼流宼内訌土賊蠭起或百萬或三四十萬攻城掠地莫可止遏明所恃者惟祖大壽并錦州松山援兵及洪承疇所領各省鎮兵耳今皆敗亡已盡即有召募新兵亦僅可充數安能拒戰明之將卒豈但不能敵我反自行剽掠自殘人民行賄朝臣詐為己功朝臣專尚姦讒蔽主耳目私納賄賂罰及無罪賞及無功以此觀之明之必亡昭然矣朕恵養爾等實欲悉予保全不使一人失業乃爾等不自圖安屢起亂端夫見亂而不以法正之恐愈滋亂而長罪也故爾國大臣崔鳴吉與明通謀金聲黒尼誤國助惡則執而囚之至於高調文舍木嵗等八人入明之登州寧逺等地往來交通又入島貿易今已斬首示衆其餘交通明國貿易餽遺之罪咸與赦除自諭之後再有與明貿易私通往來漢人船至不擒獲者必治以法不貸大清太宗應天興國𢎞徳彰武寛溫仁聖睿孝敬敏昭定隆道顯功文皇帝聖訓卷五
